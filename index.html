<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Ders Netflix UI</title>

<style>
body {
    margin:0;
    font-family: Arial;
    background:#111;
    color:white;
}

.container {
    display:flex;
    height:100vh;
}

.sidebar {
    width:30%;
    background:#1c1c1c;
    overflow-y:auto;
    padding:15px;
}

.content {
    width:70%;
}

iframe {
    width:100%;
    height:100%;
    border:none;
}

.lesson {
    padding:10px;
    margin:5px 0;
    background:#2c2c2c;
    cursor:pointer;
    border-radius:5px;
}

.lesson:hover {
    background:#444;
}

.active {
    background:#e50914;
}

.player {
    position:fixed;
    bottom:0;
    left:0;
    width:30%;
    background:#000;
    padding:10px;
}

button {
    margin:5px;
    padding:8px;
    cursor:pointer;
}
</style>
</head>

<body>

<div class="container">

    <div class="sidebar" id="list"></div>

    <div class="content">
        <iframe id="pdfViewer"></iframe>
    </div>

</div>

<div class="player">
    <audio id="audio" controls></audio>
    <br>
    <button onclick="prev()">⏮ Prev</button>
    <button onclick="next()">Next ⏭</button>
</div>

<script>

const API_KEY = "AIzaSyDBWNz1aWUyBDy7VfZy7ca7Y9MdtjXVdf8";
const FOLDER_ID = "1c9xW5CggYFkTxXD5ZHYgvAiXJNhfqy_m";

let lessons = [];
let currentIndex = 0;

async function loadFiles() {
    const url = `https://www.googleapis.com/drive/v3/files?q='${FOLDER_ID}'+in+parents&key=${API_KEY}`;

    const res = await fetch(url);
    const data = await res.json();

    const files = data.files;

    let pdfs = {};
    let audios = {};

    files.forEach(file => {
        if(file.name.endsWith(".pdf"))
            pdfs[file.name.replace(".pdf","")] = file.id;

        if(file.name.endsWith(".mp3"))
            audios[file.name.replace(".mp3","")] = file.id;
    });

    for(let key in pdfs){
        if(audios[key]){
            lessons.push({
                name:key,
                pdf:pdfs[key],
                audio:audios[key]
            });
        }
    }

    renderList();
    loadLesson(0);
}

function renderList(){
    const list = document.getElementById("list");
    list.innerHTML="";

    lessons.forEach((l,i)=>{
        const div = document.createElement("div");
        div.className="lesson";
        div.innerText = l.name;

        div.onclick = ()=> loadLesson(i);

        list.appendChild(div);
    });
}

function loadLesson(index){
    currentIndex = index;

    const l = lessons[index];

    document.getElementById("pdfViewer").src =
        `https://drive.google.com/file/d/${l.pdf}/preview`;

    document.getElementById("audio").src =
        `https://docs.google.com/uc?export=open&id=${l.audio}`;

    document.querySelectorAll(".lesson").forEach(el=>el.classList.remove("active"));
    document.querySelectorAll(".lesson")[index].classList.add("active");
}

function next(){
    if(currentIndex < lessons.length-1){
        loadLesson(currentIndex+1);
    }
}

function prev(){
    if(currentIndex > 0){
        loadLesson(currentIndex-1);
    }
}

loadFiles();

</script>

</body>
</html>
