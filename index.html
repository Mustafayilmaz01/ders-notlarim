<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Ders Paneli</title>

<style>
body { margin:0; font-family:Arial; background:#111; color:white; }

.container { display:flex; height:100vh; }

.left {
    width:30%;
    background:#1c1c1c;
    overflow-y:auto;
    padding:10px;
}

.right {
    width:70%;
}

iframe {
    width:100%;
    height:100%;
    border:none;
}

.item {
    padding:10px;
    margin:5px 0;
    background:#2c2c2c;
    cursor:pointer;
    border-radius:5px;
}

.item:hover { background:#444; }

.section-title {
    margin-top:15px;
    font-weight:bold;
    color:#e50914;
}

audio {
    width:100%;
    position:fixed;
    bottom:0;
    left:0;
}
</style>
</head>

<body>

<div class="container">

    <!-- SOL PANEL -->
    <div class="left" id="list">
        Yükleniyor...
    </div>

    <!-- SAĞ PANEL -->
    <div class="right">
        <iframe id="viewer"></iframe>
    </div>

</div>

<audio id="audio" controls></audio>

<script>

let files = [];

fetch("files.json")
.then(res => res.json())
.then(data => {

    files = data.files;

    let audioList = [];
    let docList = [];

    files.forEach(f => {
        if(f.name.endsWith(".mp3") || f.name.endsWith(".wav"))
            audioList.push(f);

        if(f.name.endsWith(".pdf") || f.name.endsWith(".pptx"))
            docList.push(f);
    });

    render(audioList, docList);

});

function render(audioList, docList){

    const list = document.getElementById("list");
    list.innerHTML = "";

    list.innerHTML += "<div class='section-title'>🎧 Sesler</div>";

    audioList.forEach(a=>{
        const div = document.createElement("div");
        div.className="item";
        div.innerText = a.name;

        div.onclick = ()=>{
            document.getElementById("audio").src =
                `https://docs.google.com/uc?export=open&id=${a.id}`;
        };

        list.appendChild(div);
    });

    list.innerHTML += "<div class='section-title'>📄 PDF / PPTX</div>";

    docList.forEach(d=>{
        const div = document.createElement("div");
        div.className="item";
        div.innerText = d.name;

        div.onclick = ()=>{
            document.getElementById("viewer").src =
                `https://drive.google.com/file/d/${d.id}/preview`;
        };

        list.appendChild(div);
    });
}

</script>

</body>
</html>
