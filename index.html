<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dersflix</title>

<style>
body{margin:0;font-family:Arial;background:#0f0f0f;color:#fff}
.container{display:flex;height:100vh}

/* LEFT PANEL */
.left{
  width:28%;
  background:#181818;
  overflow:auto;
  padding:15px;
  border-right:1px solid #333;
}

.logo{
  font-size:22px;
  font-weight:bold;
  color:#e50914;
  margin-bottom:15px;
}

.item{
  padding:12px;
  margin:6px 0;
  background:#222;
  border-radius:6px;
  cursor:pointer;
  transition:0.2s;
}
.item:hover{background:#333;transform:scale(1.02)}

.section{
  margin-top:20px;
  color:#e50914;
  font-weight:bold;
}

/* RIGHT PANEL */
.right{
  width:72%;
}
iframe{
  width:100%;
  height:100%;
  border:none;
}

/* PLAYER BAR */
.player{
  position:fixed;
  bottom:0;
  left:0;
  width:100%;
  background:#181818;
  padding:10px;
  display:flex;
  align-items:center;
  gap:10px;
  border-top:1px solid #333;
}

.player button{
  background:#e50914;
  border:none;
  padding:8px 12px;
  color:#fff;
  cursor:pointer;
  border-radius:5px;
}

.player button:hover{background:#ff2a2a}

.info{
  flex:1;
  font-size:14px;
}

audio{
  width:40%;
}
</style>
</head>

<body>

<div class="container">

  <div class="left" id="list">
    <div class="logo">🎬 Dersflix</div>
    Yükleniyor...
  </div>

  <div class="right">
    <iframe id="viewer"></iframe>
  </div>

</div>

<div class="player">
  <button onclick="prev()">⏮</button>
  <button onclick="next()">⏭</button>

  <div class="info">
    <div id="title">Bir şey seç</div>
  </div>

  <audio id="audio" controls></audio>
</div>

<script>

const API_KEY = "AIzaSyDBWNz1aWUyBDy7VfZy7ca7Y9MdtjXVdf8";
const FOLDER_ID = "1c9xW5CggYFkTxXD5ZHYgvAiXJNhfqy_m";

let audioList = [];
let currentIndex = 0;

async function loadFiles(){

  const url = `https://www.googleapis.com/drive/v3/files?q='${FOLDER_ID}'+in+parents+and+trashed=false&fields=files(id,name,mimeType)&key=${API_KEY}`;

  const res = await fetch(url);
  const data = await res.json();

  console.log(data); // DEBUG

  if(!data.files){
    document.getElementById("list").innerHTML="❌ API çalışmadı";
    return;
  }

  let audios = [];
  let docs = [];

  data.files.forEach(f=>{
    if(f.mimeType.includes("audio")) audios.push(f);
    if(f.mimeType==="application/pdf" || f.name.endsWith(".pptx")) docs.push(f);
  });

  if(audios.length === 0 && docs.length === 0){
    document.getElementById("list").innerHTML="❌ Dosya bulunamadı";
    return;
  }

  audioList = audios;
  render(audios,docs);
}

function render(audios,docs){

  const list=document.getElementById("list");
  list.innerHTML="<div class='logo'>🎬 Dersflix</div>";

  list.innerHTML+="<div class='section'>🎧 Sesler</div>";

  audios.forEach((a,index)=>{
    const div=document.createElement("div");
    div.className="item";
    div.innerText=a.name;

    div.onclick=()=>{
      playAudio(index);
    };

    list.appendChild(div);
  });

  list.innerHTML+="<div class='section'>📄 PDF / PPTX</div>";

  docs.forEach(d=>{
    const div=document.createElement("div");
    div.className="item";
    div.innerText=d.name;

    div.onclick=()=>{
      document.getElementById("viewer").src =
        `https://drive.google.com/file/d/${d.id}/preview`;
    };

    list.appendChild(div);
  });
}

function playAudio(index){
  currentIndex = index;
  const file = audioList[index];

  const audio = document.getElementById("audio");
  audio.src = `https://docs.google.com/uc?export=open&id=${file.id}`;
  audio.play();

  document.getElementById("title").innerText = file.name;
}

function next(){
  if(currentIndex < audioList.length-1){
    playAudio(currentIndex+1);
  }
}

function prev(){
  if(currentIndex > 0){
    playAudio(currentIndex-1);
  }
}

document.getElementById("audio").addEventListener("ended",()=>{
  next();
});

loadFiles();

</script>

</body>
</html>
