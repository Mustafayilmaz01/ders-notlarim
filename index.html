<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ders Arşivim</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f0e0c;
    --surface: #1a1916;
    --card: #222018;
    --border: #2e2c27;
    --accent: #c9a84c;
    --accent2: #8b6914;
    --text: #e8e4d9;
    --muted: #7a7567;
    --danger: #c0392b;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
  }

  /* ── HEADER ── */
  header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 20px 32px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  header h1 {
    font-family: 'Playfair Display', serif;
    font-size: 1.5rem;
    color: var(--accent);
    letter-spacing: 0.5px;
  }
  header p { color: var(--muted); font-size: 0.8rem; margin-top: 2px; }

  .add-btn {
    background: var(--accent);
    color: #0f0e0c;
    border: none;
    padding: 10px 20px;
    border-radius: 8px;
    font-family: 'DM Sans', sans-serif;
    font-weight: 500;
    font-size: 0.9rem;
    cursor: pointer;
    transition: background 0.2s;
  }
  .add-btn:hover { background: #e0bb62; }

  /* ── LAYOUT ── */
  .container {
    max-width: 1100px;
    margin: 0 auto;
    padding: 32px 20px;
  }

  /* ── SEARCH / FILTER ── */
  .toolbar {
    display: flex;
    gap: 12px;
    margin-bottom: 28px;
    flex-wrap: wrap;
  }
  .search-box {
    flex: 1;
    min-width: 200px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 16px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.9rem;
    outline: none;
    transition: border-color 0.2s;
  }
  .search-box:focus { border-color: var(--accent); }
  .search-box::placeholder { color: var(--muted); }

  .filter-btn {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--muted);
    padding: 10px 16px;
    border-radius: 8px;
    cursor: pointer;
    font-size: 0.85rem;
    font-family: 'DM Sans', sans-serif;
    transition: all 0.2s;
  }
  .filter-btn.active {
    border-color: var(--accent);
    color: var(--accent);
    background: rgba(201,168,76,0.08);
  }

  /* ── GRID ── */
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
    gap: 20px;
  }

  /* ── CARD ── */
  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 14px;
    overflow: hidden;
    transition: transform 0.2s, box-shadow 0.2s;
    animation: fadeIn 0.3s ease;
  }
  .card:hover {
    transform: translateY(-3px);
    box-shadow: 0 12px 32px rgba(0,0,0,0.4);
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(10px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .card-header {
    padding: 18px 20px 14px;
    border-bottom: 1px solid var(--border);
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
  }
  .card-title {
    font-family: 'Playfair Display', serif;
    font-size: 1.05rem;
    color: var(--text);
    line-height: 1.3;
  }
  .card-date {
    font-size: 0.75rem;
    color: var(--muted);
    margin-top: 4px;
  }
  .card-tag {
    background: rgba(201,168,76,0.12);
    color: var(--accent);
    font-size: 0.7rem;
    padding: 3px 10px;
    border-radius: 20px;
    border: 1px solid rgba(201,168,76,0.25);
    white-space: nowrap;
  }

  .card-body { padding: 16px 20px; }

  /* Audio player */
  .audio-section {
    margin-bottom: 14px;
  }
  .audio-label {
    font-size: 0.72rem;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.8px;
    margin-bottom: 6px;
  }
  .custom-audio {
    display: flex;
    align-items: center;
    gap: 10px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 10px 14px;
  }
  .play-btn {
    width: 32px; height: 32px;
    border-radius: 50%;
    background: var(--accent);
    border: none;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: background 0.2s;
  }
  .play-btn:hover { background: #e0bb62; }
  .play-btn svg { fill: #0f0e0c; }

  .audio-info { flex: 1; min-width: 0; }
  .audio-name {
    font-size: 0.8rem;
    color: var(--text);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .progress-wrap {
    height: 4px;
    background: var(--border);
    border-radius: 2px;
    margin-top: 6px;
    cursor: pointer;
    position: relative;
  }
  .progress-bar {
    height: 100%;
    background: var(--accent);
    border-radius: 2px;
    width: 0%;
    transition: width 0.1s;
  }
  .audio-time { font-size: 0.72rem; color: var(--muted); flex-shrink: 0; }

  /* Notes */
  .notes-section {}
  .notes-label {
    font-size: 0.72rem;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.8px;
    margin-bottom: 8px;
  }
  .notes-content {
    font-size: 0.85rem;
    color: #b5b09f;
    line-height: 1.6;
    max-height: 80px;
    overflow: hidden;
    position: relative;
  }
  .notes-content.expanded { max-height: none; }
  .read-more {
    color: var(--accent);
    font-size: 0.78rem;
    cursor: pointer;
    margin-top: 4px;
    display: inline-block;
  }

  /* Files */
  .files-section { margin-top: 12px; }
  .file-chip {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    background: rgba(255,255,255,0.04);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 4px 10px;
    font-size: 0.75rem;
    color: var(--muted);
    margin: 3px 3px 0 0;
    cursor: pointer;
    transition: all 0.2s;
    text-decoration: none;
  }
  .file-chip:hover { border-color: var(--accent); color: var(--accent); }

  .card-footer {
    padding: 12px 20px;
    border-top: 1px solid var(--border);
    display: flex;
    justify-content: flex-end;
    gap: 8px;
  }
  .icon-btn {
    background: none;
    border: 1px solid var(--border);
    color: var(--muted);
    padding: 6px 12px;
    border-radius: 6px;
    font-size: 0.78rem;
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    transition: all 0.2s;
  }
  .icon-btn:hover { color: var(--accent); border-color: var(--accent); }
  .icon-btn.del:hover { color: var(--danger); border-color: var(--danger); }

  /* Empty state */
  .empty {
    text-align: center;
    padding: 80px 20px;
    color: var(--muted);
    grid-column: 1/-1;
  }
  .empty-icon { font-size: 3rem; margin-bottom: 16px; }
  .empty h3 { font-family: 'Playfair Display', serif; color: var(--text); margin-bottom: 8px; }

  /* ── MODAL ── */
  .overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7);
    z-index: 200;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  .overlay.open { display: flex; }

  .modal {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 28px;
    width: 100%;
    max-width: 520px;
    max-height: 90vh;
    overflow-y: auto;
    animation: slideUp 0.25s ease;
  }
  @keyframes slideUp {
    from { transform: translateY(20px); opacity: 0; }
    to   { transform: translateY(0);    opacity: 1; }
  }
  .modal h2 {
    font-family: 'Playfair Display', serif;
    color: var(--accent);
    margin-bottom: 22px;
    font-size: 1.2rem;
  }

  label {
    display: block;
    font-size: 0.78rem;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.7px;
    margin-bottom: 6px;
    margin-top: 16px;
  }
  label:first-of-type { margin-top: 0; }

  input[type=text], textarea, select {
    width: 100%;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 14px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.9rem;
    outline: none;
    transition: border-color 0.2s;
  }
  input:focus, textarea:focus, select:focus { border-color: var(--accent); }
  select option { background: var(--card); }
  textarea { resize: vertical; min-height: 90px; }

  .file-input-wrap {
    background: var(--card);
    border: 1px dashed var(--border);
    border-radius: 8px;
    padding: 16px;
    text-align: center;
    cursor: pointer;
    transition: border-color 0.2s;
    font-size: 0.85rem;
    color: var(--muted);
  }
  .file-input-wrap:hover { border-color: var(--accent); }
  .file-input-wrap input { display: none; }
  .selected-files { margin-top: 8px; font-size: 0.78rem; color: var(--accent); }

  .modal-actions {
    display: flex;
    gap: 10px;
    margin-top: 24px;
    justify-content: flex-end;
  }
  .btn-cancel {
    background: none;
    border: 1px solid var(--border);
    color: var(--muted);
    padding: 10px 20px;
    border-radius: 8px;
    font-family: 'DM Sans', sans-serif;
    cursor: pointer;
  }
  .btn-save {
    background: var(--accent);
    color: #0f0e0c;
    border: none;
    padding: 10px 24px;
    border-radius: 8px;
    font-family: 'DM Sans', sans-serif;
    font-weight: 500;
    cursor: pointer;
    transition: background 0.2s;
  }
  .btn-save:hover { background: #e0bb62; }

  /* Links */
  .link-row {
    display: flex;
    gap: 8px;
    margin-bottom: 8px;
    align-items: center;
  }
  .link-row input { margin: 0; }
  .link-label-input { flex: 0 0 110px !important; }
  .link-url-input   { flex: 1 !important; }
  .link-del-btn {
    background: none;
    border: 1px solid var(--border);
    color: var(--muted);
    border-radius: 6px;
    width: 32px; height: 36px;
    cursor: pointer;
    font-size: 1rem;
    flex-shrink: 0;
    transition: all 0.2s;
  }
  .link-del-btn:hover { color: var(--danger); border-color: var(--danger); }

  .add-link-btn {
    background: none;
    border: 1px dashed var(--border);
    color: var(--accent);
    border-radius: 8px;
    padding: 7px 14px;
    font-size: 0.82rem;
    font-family: 'DM Sans', sans-serif;
    cursor: pointer;
    width: 100%;
    margin-top: 2px;
    transition: all 0.2s;
  }
  .add-link-btn:hover { border-color: var(--accent); background: rgba(201,168,76,0.06); }

  /* Link chips on card */
  .link-chip {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    background: rgba(201,168,76,0.07);
    border: 1px solid rgba(201,168,76,0.2);
    border-radius: 6px;
    padding: 4px 10px;
    font-size: 0.75rem;
    color: var(--accent);
    margin: 3px 3px 0 0;
    text-decoration: none;
    transition: all 0.2s;
  }
  .link-chip:hover { background: rgba(201,168,76,0.15); border-color: var(--accent); }

  .toast {
    position: fixed;
    bottom: 24px;
    right: 24px;
    background: var(--accent);
    color: #0f0e0c;
    padding: 12px 20px;
    border-radius: 8px;
    font-size: 0.85rem;
    font-weight: 500;
    z-index: 999;
    transform: translateY(80px);
    opacity: 0;
    transition: all 0.3s;
  }
  .toast.show { transform: translateY(0); opacity: 1; }

  /* Section count */
  .section-title {
    font-size: 0.72rem;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 18px;
  }
  .section-title span {
    color: var(--accent);
    margin-left: 6px;
  }
</style>
</head>
<body>

<header>
  <div>
    <h1>📚 Ders Arşivim</h1>
    <p>Notlar · Ses Kayıtları · Dosyalar</p>
  </div>
  <button class="add-btn" onclick="openModal()">+ Yeni Ders Ekle</button>
</header>

<div class="container">
  <div class="toolbar">
    <input class="search-box" id="searchInput" placeholder="🔍 Ders ara..." oninput="renderCards()">
    <button class="filter-btn active" data-tag="all" onclick="setFilter(this,'all')">Tümü</button>
    <button class="filter-btn" data-tag="Matematik" onclick="setFilter(this,'Matematik')">Matematik</button>
    <button class="filter-btn" data-tag="Fizik" onclick="setFilter(this,'Fizik')">Fizik</button>
    <button class="filter-btn" data-tag="Kimya" onclick="setFilter(this,'Kimya')">Kimya</button>
    <button class="filter-btn" data-tag="Biyoloji" onclick="setFilter(this,'Biyoloji')">Biyoloji</button>
    <button class="filter-btn" data-tag="Diğer" onclick="setFilter(this,'Diğer')">Diğer</button>
  </div>

  <div class="section-title">Dersler <span id="count">0</span></div>
  <div class="grid" id="grid"></div>
</div>

<!-- MODAL -->
<div class="overlay" id="overlay" onclick="closeOnOverlay(event)">
  <div class="modal">
    <h2 id="modalTitle">Yeni Ders Ekle</h2>

    <label>Ders Adı</label>
    <input type="text" id="fTitle" placeholder="örn: Türev — Zincir Kuralı">

    <label>Konu / Ders</label>
    <select id="fTag">
      <option>Matematik</option>
      <option>Fizik</option>
      <option>Kimya</option>
      <option>Biyoloji</option>
      <option>Diğer</option>
    </select>

    <label>Notlar</label>
    <textarea id="fNotes" placeholder="Bu derste işlenen konuları buraya yaz..."></textarea>

    <label>Ses Kaydı (MP3, M4A, WAV)</label>
    <div class="file-input-wrap" onclick="document.getElementById('fAudio').click()">
      🎙️ Ses dosyası seç veya buraya tıkla
      <input type="file" id="fAudio" accept="audio/*" onchange="previewAudio(this)">
      <div class="selected-files" id="audioName"></div>
    </div>

    <label>Ek Dosyalar (PDF, görsel, vb.)</label>
    <div class="file-input-wrap" onclick="document.getElementById('fFiles').click()">
      📎 Dosya seç (birden fazla seçebilirsin)
      <input type="file" id="fFiles" multiple onchange="previewFiles(this)">
      <div class="selected-files" id="filesName"></div>
    </div>

    <label>🔗 Kalıcı Linkler (Google Drive, Dropbox, YouTube vb.)</label>
    <div id="linksContainer"></div>
    <button type="button" class="add-link-btn" onclick="addLinkRow()">+ Link ekle</button>

    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal()">İptal</button>
      <button class="btn-save" onclick="saveLesson()">Kaydet</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ─── State ───────────────────────────────────────
let lessons = JSON.parse(localStorage.getItem('dersler') || '[]');
let editingId = null;
let activeFilter = 'all';
let audioBlobs = {}; // id -> blob URL
let fileBlobs  = {}; // id -> [{name, url}]

// ─── Persist ─────────────────────────────────────
function save() {
  localStorage.setItem('dersler', JSON.stringify(lessons));
}

// ─── Toast ───────────────────────────────────────
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

// ─── Filter ──────────────────────────────────────
function setFilter(btn, tag) {
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  activeFilter = tag;
  renderCards();
}

// ─── Modal ───────────────────────────────────────
function openModal(id = null) {
  editingId = id;
  document.getElementById('modalTitle').textContent = id ? 'Dersi Düzenle' : 'Yeni Ders Ekle';
  document.getElementById('audioName').textContent = '';
  document.getElementById('filesName').textContent = '';
  document.getElementById('fAudio').value = '';
  document.getElementById('fFiles').value = '';

  if (id) {
    const l = lessons.find(x => x.id === id);
    document.getElementById('fTitle').value = l.title;
    document.getElementById('fTag').value   = l.tag;
    document.getElementById('fNotes').value = l.notes;
    document.getElementById('linksContainer').innerHTML = '';
    (l.links || []).forEach(lk => addLinkRow(lk.label, lk.url));
    if (audioBlobs[id]) document.getElementById('audioName').textContent = '✓ Mevcut ses kaydı var';
    if (fileBlobs[id]?.length) document.getElementById('filesName').textContent = `✓ ${fileBlobs[id].length} dosya var`;
  } else {
    document.getElementById('fTitle').value = '';
    document.getElementById('fTag').value   = 'Matematik';
    document.getElementById('fNotes').value = '';
    document.getElementById('linksContainer').innerHTML = '';
  }
  document.getElementById('overlay').classList.add('open');
}

function closeModal() {
  document.getElementById('overlay').classList.remove('open');
  editingId = null;
}
function closeOnOverlay(e) { if (e.target === document.getElementById('overlay')) closeModal(); }

function previewAudio(input) {
  const f = input.files[0];
  document.getElementById('audioName').textContent = f ? `✓ ${f.name}` : '';
}
function previewFiles(input) {
  const names = [...input.files].map(f => f.name).join(', ');
  document.getElementById('filesName').textContent = names ? `✓ ${names}` : '';
}

function addLinkRow(label = '', url = '') {
  const container = document.getElementById('linksContainer');
  const row = document.createElement('div');
  row.className = 'link-row';
  row.innerHTML = `
    <input type="text" class="link-label-input" placeholder="Etiket (ör: Ses Kaydı)" value="${label}">
    <input type="text" class="link-url-input"   placeholder="https://..." value="${url}">
    <button type="button" class="link-del-btn" onclick="this.parentElement.remove()">✕</button>
  `;
  container.appendChild(row);
}

function getLinks() {
  return [...document.querySelectorAll('#linksContainer .link-row')].map(row => {
    const inputs = row.querySelectorAll('input');
    return { label: inputs[0].value.trim() || 'Link', url: inputs[1].value.trim() };
  }).filter(l => l.url);
}

function linkIcon(url) {
  if (url.includes('drive.google'))  return '📁';
  if (url.includes('dropbox'))       return '📦';
  if (url.includes('youtube') || url.includes('youtu.be')) return '▶️';
  if (url.includes('docs.google'))   return '📄';
  return '🔗';
}


  const title = document.getElementById('fTitle').value.trim();
  if (!title) { showToast('Ders adı boş olamaz!'); return; }

  const id = editingId || Date.now().toString();
  const lesson = {
    id,
    title,
    tag:   document.getElementById('fTag').value,
    notes: document.getElementById('fNotes').value,
    links: getLinks(),
    date:  editingId ? (lessons.find(x=>x.id===id)?.date || new Date().toLocaleDateString('tr-TR')) : new Date().toLocaleDateString('tr-TR'),
  };

  // Audio blob
  const aFile = document.getElementById('fAudio').files[0];
  if (aFile) audioBlobs[id] = URL.createObjectURL(aFile);

  // Extra files
  const fFiles = [...document.getElementById('fFiles').files];
  if (fFiles.length) {
    fileBlobs[id] = fFiles.map(f => ({ name: f.name, url: URL.createObjectURL(f) }));
  }

  if (editingId) {
    const idx = lessons.findIndex(x => x.id === editingId);
    lessons[idx] = lesson;
  } else {
    lessons.unshift(lesson);
  }

  save();
  closeModal();
  renderCards();
  showToast(editingId ? 'Ders güncellendi ✓' : 'Ders eklendi ✓');
}

function deleteLesson(id) {
  if (!confirm('Bu dersi silmek istediğine emin misin?')) return;
  lessons = lessons.filter(x => x.id !== id);
  delete audioBlobs[id];
  delete fileBlobs[id];
  save();
  renderCards();
  showToast('Ders silindi.');
}

// ─── Audio Players ───────────────────────────────
const players = {};

function togglePlay(id) {
  const audio = players[id];
  if (!audio) return;
  const btn = document.querySelector(`#play-${id} svg`);
  if (audio.paused) {
    // pause all others
    Object.values(players).forEach(a => a.pause());
    document.querySelectorAll('.play-btn svg').forEach(s => {
      s.innerHTML = playIcon();
    });
    audio.play();
    btn.innerHTML = pauseIcon();
  } else {
    audio.pause();
    btn.innerHTML = playIcon();
  }
}

function playIcon()  { return '<path d="M8 5v14l11-7z"/>'; }
function pauseIcon() { return '<path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>'; }

function initPlayer(id, src) {
  if (players[id]) return;
  const audio = new Audio(src);
  players[id] = audio;

  audio.addEventListener('timeupdate', () => {
    const pct = (audio.currentTime / audio.duration) * 100 || 0;
    const bar  = document.getElementById(`bar-${id}`);
    const time = document.getElementById(`time-${id}`);
    if (bar)  bar.style.width  = pct + '%';
    if (time) time.textContent = fmt(audio.currentTime) + ' / ' + fmt(audio.duration);
  });

  audio.addEventListener('ended', () => {
    const btn = document.querySelector(`#play-${id} svg`);
    if (btn) btn.innerHTML = playIcon();
    const bar = document.getElementById(`bar-${id}`);
    if (bar) bar.style.width = '0%';
  });
}

function seekAudio(e, id) {
  const audio = players[id];
  if (!audio || !audio.duration) return;
  const rect = e.currentTarget.getBoundingClientRect();
  const pct  = (e.clientX - rect.left) / rect.width;
  audio.currentTime = pct * audio.duration;
}

function fmt(s) {
  if (isNaN(s)) return '0:00';
  const m = Math.floor(s/60);
  const sec = Math.floor(s%60).toString().padStart(2,'0');
  return `${m}:${sec}`;
}

// ─── Render ──────────────────────────────────────
function renderCards() {
  const query = document.getElementById('searchInput').value.toLowerCase();
  let filtered = lessons.filter(l => {
    const matchTag   = activeFilter === 'all' || l.tag === activeFilter;
    const matchQuery = l.title.toLowerCase().includes(query) ||
                       l.notes.toLowerCase().includes(query) ||
                       l.tag.toLowerCase().includes(query);
    return matchTag && matchQuery;
  });

  document.getElementById('count').textContent = filtered.length;
  const grid = document.getElementById('grid');

  if (!filtered.length) {
    grid.innerHTML = `
      <div class="empty">
        <div class="empty-icon">📭</div>
        <h3>${lessons.length ? 'Aramanla eşleşen ders bulunamadı' : 'Henüz ders eklenmedi'}</h3>
        <p style="margin-top:8px;font-size:.85rem">${lessons.length ? '' : 'Sağ üstteki "+ Yeni Ders Ekle" butonuna tıkla'}</p>
      </div>`;
    return;
  }

  grid.innerHTML = filtered.map(l => {
    const hasAudio = !!audioBlobs[l.id];
    const files    = fileBlobs[l.id] || [];
    const shortNote = l.notes.length > 120 ? l.notes.slice(0,120) + '…' : l.notes;

    const audioHTML = hasAudio ? `
      <div class="audio-section">
        <div class="audio-label">🎙 Ses Kaydı</div>
        <div class="custom-audio">
          <button class="play-btn" id="play-${l.id}" onclick="togglePlay('${l.id}')">
            <svg viewBox="0 0 24 24" width="14" height="14">${playIcon()}</svg>
          </button>
          <div class="audio-info">
            <div class="audio-name">ses_kaydi.mp3</div>
            <div class="progress-wrap" onclick="seekAudio(event,'${l.id}')">
              <div class="progress-bar" id="bar-${l.id}"></div>
            </div>
          </div>
          <div class="audio-time" id="time-${l.id}">0:00</div>
        </div>
      </div>` : '';

    const filesHTML = files.length ? `
      <div class="files-section">
        <div class="audio-label">📎 Dosyalar</div>
        ${files.map(f => `<a class="file-chip" href="${f.url}" download="${f.name}" title="${f.name}">📄 ${f.name.length > 20 ? f.name.slice(0,20)+'…' : f.name}</a>`).join('')}
      </div>` : '';

    const notesHTML = l.notes ? `
      <div class="notes-section">
        <div class="notes-label">📝 Notlar</div>
        <div class="notes-content" id="notes-${l.id}">${shortNote}</div>
        ${l.notes.length > 120 ? `<span class="read-more" onclick="expandNotes('${l.id}','${encodeURIComponent(l.notes)}')">Devamını gör</span>` : ''}
      </div>` : '';

    const linksHTML = (l.links && l.links.length) ? `
      <div class="files-section" style="margin-top:12px">
        <div class="audio-label">🔗 Kalıcı Linkler</div>
        ${l.links.map(lk => `<a class="link-chip" href="${lk.url}" target="_blank" rel="noopener">${linkIcon(lk.url)} ${lk.label}</a>`).join('')}
      </div>` : '';

    return `
      <div class="card" id="card-${l.id}">
        <div class="card-header">
          <div>
            <div class="card-title">${l.title}</div>
            <div class="card-date">${l.date}</div>
          </div>
          <span class="card-tag">${l.tag}</span>
        </div>
        <div class="card-body">
          ${audioHTML}
          ${notesHTML}
          ${filesHTML}
          ${linksHTML}
        </div>
        <div class="card-footer">
          <button class="icon-btn" onclick="openModal('${l.id}')">✏️ Düzenle</button>
          <button class="icon-btn del" onclick="deleteLesson('${l.id}')">🗑 Sil</button>
        </div>
      </div>`;
  }).join('');

  // init audio players
  filtered.forEach(l => {
    if (audioBlobs[l.id]) initPlayer(l.id, audioBlobs[l.id]);
  });
}

function expandNotes(id, encoded) {
  const el = document.getElementById(`notes-${id}`);
  if (!el) return;
  el.textContent = decodeURIComponent(encoded);
  el.nextElementSibling?.remove();
}

// ─── Boot ─────────────────────────────────────────
renderCards();
</script>
</body>
</html>
